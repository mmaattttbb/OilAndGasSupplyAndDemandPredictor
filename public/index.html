<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Node.js Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">Supply & Disposition of Natural Gas Canada</div>
        <ul>
          <li><a href="#top">Home</a></li>
          <li><a href="#about">About</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="nav-buttons">
        <button class="nav-btn" data-section="supply">Supply</button>
        <button class="nav-btn" data-section="demand">Demand</button>
        <button class="nav-btn" data-section="price">Price</button>
        <button class="nav-btn" data-section="weather">Weather</button>
        <button id="resetBtn" class="nav-btn">Reset</button>
      </div>
      <div class="section-panel" id="section-demand" style="display: none">
        <div id="chart-toggles-exports">
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="4" />
            <span class="checkmark" style="--chk-color: #9c27b0"></span>
            BC Exports
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="5" />
            <span class="checkmark" style="--chk-color: #00bcd4"></span>
            Alberta Exports
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="6" />
            <span class="checkmark" style="--chk-color: #8bc34a"></span>
            Chippawa Exports
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="7" />
            <span class="checkmark" style="--chk-color: #e91e63"></span>
            Iroquois Exports
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="8" />
            <span class="checkmark" style="--chk-color: #ffc107"></span>
            Niagara Exports
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="9" />
            <span class="checkmark" style="--chk-color: #607d8b"></span>
            Ontario Exports
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="26" />
            <span class="checkmark" style="--chk-color: #ff1744"></span>
            Ontario Residential Consumption
          </label>
        </div>
      </div>
      <div class="section-panel" id="section-supply" style="display: none">
        <div id="chart-toggles-imports">
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="12" />
            <span class="checkmark" style="--chk-color: #009688"></span>
            BC Closing Inventory
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="13" />
            <span class="checkmark" style="--chk-color: #ff5722"></span>
            Eastern Triangle NOL Receipts
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="14" />
            <span class="checkmark" style="--chk-color: #795548"></span>
            Chippawa Import
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="15" />
            <span class="checkmark" style="--chk-color: #9e9e9e"></span>
            Iroquois Import
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="16" />
            <span class="checkmark" style="--chk-color: #cddc39"></span>
            Niagara Import
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="21" />
            <span class="checkmark" style="--chk-color: #40c4ff"></span>
            Alberta Production
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="22" />
            <span class="checkmark" style="--chk-color: #e040fb"></span>
            BC Production
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="27" />
            <span class="checkmark" style="--chk-color: #651fff"></span>
            Ontario Closing Inventory
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="28" />
            <span class="checkmark" style="--chk-color: #f50057"></span>
            Alberta Closing Inventory
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="10" />
            <span class="checkmark" style="--chk-color: #f44336"></span>
            Pennsylvania Production
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="11" />
            <span class="checkmark" style="--chk-color: #3f51b5"></span>
            West-Virginia Production
          </label>
        </div>
      </div>
      <div class="section-panel" id="section-weather" style="display: none">
        <div id="chart-toggles-weather">
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="30" />
            <span class="checkmark" style="--chk-color: #ffc107"></span>
            Temperature 2m Mean
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="31" />
            <span class="checkmark" style="--chk-color: #03a9f4"></span>
            Precipitation Sum
          </label>
        </div>
      </div>
      <div class="section-panel" id="section-price" style="display: none">
        <div id="chart-toggles">
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="0" />
            <span class="checkmark" style="--chk-color: #4caf50"></span>
            Alberta Price
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="1" />
            <span class="checkmark" style="--chk-color: #2196f3"></span>
            Ontario Price
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="2" />
            <span class="checkmark" style="--chk-color: #ff9800"></span>
            Citygate NY
          </label>
          <label class="toggle-checkbox">
            <input type="checkbox" data-dataset="3" />
            <span class="checkmark" style="--chk-color: #ff5722"></span>
            Residential NY
          </label>
        </div>
      </div>
      <div class="chart-row">
        <div class="chart-card">
          <h2></h2>
          <div class="chart-scroll-wrapper">
            <canvas id="productionChart"></canvas>
          </div>
          <div class="chart-slider">
            <label for="dataRange"
              >Showing last <span id="rangeValue">All</span> months</label
            >
            <input
              type="range"
              id="dataRange"
              min="1"
              max="24"
              value="1"
              step="1"
            />
          </div>
        </div>

        <div class="chart-card">
          <h2></h2>
          <canvas id="productionChart2"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2></h2>
        <canvas id="scatterPlot"></canvas>
      </div>
      <section id="about" class="section">
        <div class="nav-buttons">
          <button class="nav-btn" data-section="supply">Supply</button>
          <button class="nav-btn" data-section="demand">Demand</button>
          <button class="nav-btn" data-section="price">Price</button>
        </div>
        <div class="chart-card">
          <canvas id="scatterPlot"></canvas>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
