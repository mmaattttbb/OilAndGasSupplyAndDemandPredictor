<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Page Not Found</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .not-found {
        text-align: center;
        padding: 8rem 2rem;
      }
      .not-found h1 {
        font-size: 6rem;
        color: var(--accent);
        margin-bottom: 0.5rem;
        -webkit-text-fill-color: unset;
        background: none;
      }
      .not-found p {
        color: var(--muted);
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="not-found">
        <h1>404</h1>
        <p>Page not found.</p>
        <a href="/"><button>Go Home</button></a>
      </div>
    </main>
  </body>
</html>
